<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

		<!-- PWA Meta Tags -->
		<meta name="theme-color" content="#090714" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="EmitKit" />

		<link rel="icon" type="image/png" href="%sveltekit.assets%/favicon-96x96.png" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
		<link rel="shortcut icon" href="%sveltekit.assets%/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/apple-touch-icon.png" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />

		<meta property="og:image" content="%sveltekit.assets%/og-image.jpg" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="app-loading" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#090714;z-index:9999">
			<svg width="28" height="28" viewBox="0 0 24 24" fill="none" style="animation:_s 1s linear infinite">
				<circle cx="12" cy="12" r="10" stroke="rgba(255,255,255,0.1)" stroke-width="3"/>
				<path d="M12 2a10 10 0 0 1 10 10" stroke="rgba(255,255,255,0.5)" stroke-width="3" stroke-linecap="round"/>
			</svg>
			<style>@keyframes _s{to{transform:rotate(360deg)}}</style>
		</div>
		<div style="display: contents">%sveltekit.body%</div>
		<script>
			new MutationObserver(function(m,o){if(document.querySelector('[data-svelte-h],.svelte-')||document.body.children.length>2){var e=document.getElementById('app-loading');if(e){e.style.opacity='0';e.style.transition='opacity .15s';setTimeout(function(){e.remove()},150)}o.disconnect()}}).observe(document.body,{childList:true,subtree:true,attributes:true});
			setTimeout(function(){var e=document.getElementById('app-loading');if(e)e.remove()},4000);
		</script>
	</body>
</html>
